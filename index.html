<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beanfield Toolbox v_Base</title>
    <style>
        :root { --primary: #2d8a45; --bg: #f2f7f2; --card: #ffffff; --header: #93cc94; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .nav-tabs { position: sticky; top: 0; display: flex; background: #fff; padding: 10px; gap: 8px; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; background: #e8eee8; color: #666; }
        .tab-btn.active { background: var(--primary); color: white; }
        .page { display: none; padding: 12px; padding-bottom: 120px; }
        .page.active { display: block; }
        .card { background: white; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d0ddd0; overflow: hidden; }
        h3 { margin: 0; font-size: 14px; background: var(--header); padding: 10px 15px; color: #111; border-bottom: 1px solid #d0ddd0; }
        .card-body { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; background: #fafafa; margin-bottom: 10px; }
        .toggle-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-size: 13px; font-weight: bold; color: #666; }
        .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* 紧凑的物料列表 */
        .cat-title { font-weight: bold; margin: 15px 0 5px 0; color: #2d8a45; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .qty-ctrl { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ccc; background: white; font-weight: bold; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ccc; padding: 15px; box-sizing: border-box; display: flex; gap: 10px; }
        .btn-main { flex: 1; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; color: white; background: var(--primary); }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('picker', this)">Materials</button>
    <button class="tab-btn" onclick="showPage('beanfield', this)">Jira Form</button>
</div>

<div id="picker" class="page active">
    <div id="mat-container"></div>
</div>

<div id="beanfield" class="page">
    
    <div class="card">
        <h3>Technician(s) & Network</h3>
        <div class="card-body">
            <div class="grid">
                <div><label>Inside</label><input type="text" id="bf_in"></div>
                <div><label>Outside</label><input type="text" id="bf_out"></div>
            </div>
            <label>Network</label><input type="text" id="bf_net" value="Beanfield">
        </div>
    </div>

    <div class="card">
        <h3>Tests Completed</h3>
        <div class="card-body">
            <div class="grid">
                <div><label>Ruby 🚨</label><div class="toggle-group" id="tg_ruby"><button class="toggle-btn active" onclick="setT('tg_ruby','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_ruby','No')">No</button></div></div>
                <div><label>EXFO 📲</label><div class="toggle-group" id="tg_exfo"><button class="toggle-btn active" onclick="setT('tg_exfo','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_exfo','No')">No</button></div></div>
                <div><label>Wifi 🛜</label><div class="toggle-group" id="tg_wifi"><button class="toggle-btn active" onclick="setT('tg_wifi','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_wifi','No')">No</button></div></div>
                <div><label>Pair Test</label><div class="toggle-group" id="tg_pair"><button class="toggle-btn active" onclick="setT('tg_pair','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_pair','No')">No</button></div></div>
            </div>
            <label>Light 💡: @ 1577nm</label>
            <div class="grid">
                <div><label>-Suite (dBm)</label><input type="text" id="l_suite"></div>
                <div><label>-Panel (dBm)</label><input type="text" id="l_panel"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Installation Details</h3>
        <div class="card-body">
            <div class="grid">
                <div><label>*ONT Loc*</label><input type="text" id="ont_loc"></div>
                <div><label>*ONT MAC/SN*</label><input type="text" id="ont_mac"></div>
            </div>
            <label>ONT Model</label><input type="text" id="ont_mod" value="Nokia - 10x-R">
            
            <hr style="border-top:1px solid #eee; margin:10px 0;">
            <div class="grid">
                <div><label>*AP Loc*</label><input type="text" id="ap_loc"></div>
                <div><label>*AP MAC*</label><input type="text" id="ap_mac"></div>
            </div>
            <label>AP Model</label><input type="text" id="ap_mod" value="Nokia - Beacon">
            
            <hr style="border-top:1px solid #eee; margin:10px 0;">
            <div class="grid">
                <div><label>*TV Box Loc*</label><input type="text" id="tv_loc"></div>
                <div><label>*TV Box MAC*</label><input type="text" id="tv_mac"></div>
            </div>
            <label>TV Box Model</label><input type="text" id="tv_mod">
            
            <hr style="border-top:1px solid #eee; margin:10px 0;">
            <div class="grid">
                <div><label>*Phone Loc*</label><input type="text" id="ph_loc"></div>
                <div><label>*Phone Number*</label><input type="text" id="ph_num"></div>
            </div>
            <label>Closet Advised?</label>
            <div class="toggle-group" id="tg_closet"><button class="toggle-btn active" onclick="setT('tg_closet','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_closet','No')">No</button></div>
        </div>
    </div>

    <div class="card">
        <h3>Cat5 Termination & Locations</h3>
        <div class="card-body">
            <div class="grid">
                <div><label>Lines Term</label><input type="text" id="c5_term" placeholder="1/6"></div>
                <div><label>Pair Tested</label><input type="text" id="c5_pair" placeholder="1/6"></div>
                <div><label>Plug Beacon</label><input type="text" id="c5_plug_b" placeholder="1/4"></div>
                <div><label>Plug Zhone</label><input type="text" id="c5_plug_z" placeholder="1/4"></div>
            </div>
            <label style="margin-top:10px;">_Location(s):_</label>
            <div style="display:flex; align-items:center; margin-bottom:5px;"><span style="width:140px; font-size:13px;">Living Room 🛋️:</span><input type="text" id="rm_liv" style="margin:0;"></div>
            <div style="display:flex; align-items:center; margin-bottom:5px;"><span style="width:140px; font-size:13px;">Bedroom #1🛏️:</span><input type="text" id="rm_b1" style="margin:0;"></div>
            <div style="display:flex; align-items:center; margin-bottom:5px;"><span style="width:140px; font-size:13px;">Bedroom #2🛏️:</span><input type="text" id="rm_b2" style="margin:0;"></div>
            <div style="display:flex; align-items:center; margin-bottom:5px;"><span style="width:140px; font-size:13px;">Den/Office 📁:</span><input type="text" id="rm_den" style="margin:0;"></div>
            <div style="display:flex; align-items:center; margin-bottom:15px;"><span style="width:140px; font-size:13px;">Kitchen 🧑‍🍳:</span><input type="text" id="rm_kit" style="margin:0;"></div>
            
            <label>$100 Charge Notified?</label>
            <div class="toggle-group" id="tg_charge"><button class="toggle-btn active" onclick="setT('tg_charge','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_charge','No')">No</button></div>
        </div>
    </div>

    <div class="card">
        <h3>Riser & Fibre Meter</h3>
        <div class="card-body">
            <div class="grid">
                <div><label>Floor</label><input type="text" id="r_floor"></div>
                <div><label>Panel:/Switch</label><input type="text" id="r_panel"></div>
            </div>
            <label>Port</label><input type="text" id="r_port">
            
            <hr style="border-top:1px solid #eee; margin:10px 0;">
            <label>Pre Wired</label>
            <div class="toggle-group" id="tg_pre"><button class="toggle-btn active" onclick="setT('tg_pre','Yes')">Yes</button><button class="toggle-btn" onclick="setT('tg_pre','No')">No</button></div>
            <div class="grid">
                <div><label>Riser (m)</label><input type="number" id="f_riser" oninput="calcF()"></div>
                <div><label>Suite (m)</label><input type="number" id="f_suite" oninput="calcF()"></div>
            </div>
            <label>Total (m)</label><input type="text" id="f_total" readonly style="background:#e8f5e9; font-weight:bold;">
        </div>
    </div>

    <div class="card">
        <h3>Time, Hub & Splitter</h3>
        <div class="card-body">
            <div class="grid">
                <div><label>Start Time</label><input type="time" id="t_start" onchange="calcT()"></div>
                <div><label>End Time</label><input type="time" id="t_end" onchange="calcT()"></div>
            </div>
            <label>Time on Site</label><input type="text" id="t_total" readonly style="background:#e8f5e9; font-weight:bold;">
            
            <label>Hub Stock Location</label><input type="text" id="hub" value="2206 Eglinton">
            
            <hr style="border-top:1px solid #eee; margin:10px 0;">
            <label>Splitter Activation</label>
            <div class="grid">
                <div><label>Floor</label><input type="text" id="s_floor"></div>
                <div><label>Panel</label><input type="text" id="s_panel"></div>
                <div><label>Splitter</label><input type="text" id="s_split"></div>
                <div><label>Bulkheads</label><input type="text" id="s_bulk"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Additional Notes</h3>
        <div class="card-body"><textarea id="notes" rows="3"></textarea></div>
    </div>
</div>

<div class="footer">
    <button class="btn-main" onclick="doCopy()">COPY TO JIRA</button>
</div>

<script>
// 严格对齐你 Google Sheet 输出的 4 大类
const inventory = {
    "Copper": [
        {id:"1000289", n:"RJ45 Connector"}, {id:"1001047", n:"2 Port Faceplate"}, {id:"1001048", n:"4 port faceplates"},
        {id:"1000520", n:"White Jacks"}, {id:"1001049", n:"Coax Insert"}, {id:"1000254", n:"3ft cat5 patch cable"},
        {id:"1000497", n:"5ft cat5 patch cable"}, {id:"1000253", n:"10ft cat5 patch cable"}
    ],
    "Fibre": [
        {id:"1001083", n:"LC APC Connector"}, {id:"1000526", n:"Heat Sleeve 40mm"}, {id:"1002322", n:"Fibre Jack"},
        {id:"1002388", n:"SC APC SC APC Patches"}, {id:"1002335", n:"1m LC APC/APC Patches"}, {id:"1001084", n:"SC APC connectors"}, 
        {id:"1000422", n:"LC UPC 250/900"}, {id:"1000476", n:"SC UPC"}
    ],
    "Hardware": [
        {id:"1002324", n:"5222XG Zhone"}, {id:"1001199", n:"4 port GPON zhone"}, {id:"1002327", n:"NEW ZHONE 2424GN"}, 
        {id:"1002557", n:"Nokia XS-010X-R"}, {id:"1002555", n:"Nokia Beacon 19"}, {id:"1002344", n:"Airties 4960x"},
        {id:"1001087", n:"Active-e zhone"}, {id:"1002556", n:"Nokia XS-220x VOIP"}, {id:"1001554", n:"SML TV Box"},
        {id:"1002407", n:"Archer C20 (100MBS)"}, {id:"1002481", n:"TP LINK ARCHER AX23"}
    ],
    "Other": [
        {id:"1002573", n:"Nokia ONT Mount - Factory"}, {id:"1002589", n:"Nokia ONT Mount - Custom"}, {id:"1002445", n:"XGS / 2424GN Zhone Mount"},
        {id:"1000420", n:"Zhone mounts"}, {id:"1000715", n:"Screws (8, 3/4)"}, {id:"1000477", n:"Alchohol wipes"},
        {id:"-", n:"Beanfield Stickers"}, {id:"-", n:"Booties"}, {id:"1001208", n:"Power Extension"}, 
        {id:"1000627", n:"Dry wall anchors"}, {id:"1000137", n:"Saddles (small)"}, {id:"1000136", n:"Saddles (large)"}, 
        {id:"1000501", n:"Phone Dongles"}
    ]
};

let cart = {};
let toggles = { 'tg_ruby':'Yes', 'tg_exfo':'Yes', 'tg_wifi':'Yes', 'tg_pair':'Yes', 'tg_closet':'Yes', 'tg_charge':'Yes', 'tg_pre':'Yes' };

function setT(gid, v) {
    toggles[gid] = v;
    document.getElementById(gid).querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.innerText === v));
}

function calcF() {
    const r = parseFloat(document.getElementById('f_riser').value) || 0;
    const s = parseFloat(document.getElementById('f_suite').value) || 0;
    document.getElementById('f_total').value = (r || s) ? Math.abs(s - r) : "";
}

function calcT() {
    let s = document.getElementById('t_start').value;
    let e = document.getElementById('t_end').value;
    if(s && e) {
        let d1 = new Date(`1970-01-01T${s}:00`);
        let d2 = new Date(`1970-01-01T${e}:00`);
        let diff = (d2 - d1) / 1000;
        if(diff < 0) diff += 86400;
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        document.getElementById('t_total').value = `${hrs}:${mins.toString().padStart(2,'0')}:00`;
    }
}

function render() {
    const cont = document.getElementById('mat-container');
    cont.innerHTML = "";
    for(let cat in inventory) {
        let h = `<div class="cat-title">${cat}</div>`;
        inventory[cat].forEach(item => {
            const k = item.id + item.n;
            h += `<div class="item-row">
                <div><div style="font-size:14px; font-weight:bold;">${item.n}</div><div style="font-size:11px; color:#888;">SAP: ${item.id}</div></div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.n}',-1)">-</button>
                    <span style="font-weight:bold; min-width:15px; text-align:center;">${cart[k]?.q || 0}</span>
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.n}',1)">+</button>
                </div>
            </div>`;
        });
        cont.innerHTML += h;
    }
}

function updateQty(id, n, d) {
    const k = id + n;
    if(!cart[k]) cart[k] = {id, n, q:0};
    cart[k].q += d;
    if(cart[k].q <= 0) delete cart[k];
    render();
}

function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function doCopy() {
    const val = (id) => document.getElementById(id).value;
    const tgl = (id) => toggles[id];
    
    // 严格使用 \n 避免粘连，Jira 识别无误
    let r = `{panel:title=Technician(s):|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\nInside:${val('bf_in')}\nOutside:${val('bf_out')}\n{panel}\n`;
    
    r += `{panel:title=Network:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n${val('bf_net')}\n{panel}\n`;
    
    r += `{panel:title=Tests Completed:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n`;
    r += `Ruby 🚨:${tgl('tg_ruby')}\nLight 💡:@ 1577nm:\n-Suite: ${val('l_suite')} dBm\n-Panel: ${val('l_panel')} dBm\nC = light in suite\nD = light at panel\n`;
    r += `EXFO 📲:${tgl('tg_exfo')}\nWifi 🛜:${tgl('tg_wifi')}\nPair Test:${tgl('tg_pair')}\n{panel}\n`;

    r += `{panel:title=Installation Details:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n`;
    r += `*ONT Location*:${val('ont_loc')}\n*ONT MAC/SN*:${val('ont_mac')}\nONT Model:${val('ont_mod')}\n`;
    r += `*AP Location*:${val('ap_loc')}\n*AP MAC*:${val('ap_mac')}\nAP Model:${val('ap_mod')}\n`;
    r += `*TV Box Location*:${val('tv_loc')}\n*TV Box MAC*:${val('tv_mac')}\nTV Box Model:${val('tv_mod')}\n`;
    r += `*Phone Location*:${val('ph_loc')}\n*Phone Number*:${val('ph_num')}\n`;
    r += `_If the Airties/Beacon was left in the closet, was the customer advised of possible issues with coverage?_\n${tgl('tg_closet')}\n{panel}\n`;

    r += `{panel:title=Cat5 Termination:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n`;
    r += `Lines Terminated:${val('c5_term')}\nPair Tested:${val('c5_pair')}\nPlugged into the Beacon:${val('c5_plug_b')}\nPlugged into the Zhone:${val('c5_plug_z')}\n`;
    r += `_Location(s):_\nLiving Room 🛋️:${val('rm_liv')}\nBedroom #1🛏️:${val('rm_b1')}\nBedroom #2🛏️:${val('rm_b2')}\nDen/Office 📁:${val('rm_den')}\nKitchen 🧑‍🍳:${val('rm_kit')}\n`;
    r += `_Was the Customer Notified of $100 Charge for a Return Visit ?_\n${tgl('tg_charge')}\n{panel}\n`;

    r += `{panel:title=Riser Info:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\nFloor:${val('r_floor')}\nPanel:/Switch${val('r_panel')}\nPort:${val('r_port')}\n{panel}\n`;

    r += `{panel:title=Fibre Meter Mark:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\nPre Wired:${tgl('tg_pre')}\nRiser =${val('f_riser')}m\nSuite =${val('f_suite')}m\nTotal =${val('f_total')}m\n{panel}\n`;

    let sTime = val('t_start') ? convertTime(val('t_start')) : "";
    r += `{panel:title=Time on Site:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n* Start Time:${sTime}\n* End Time:${val('t_end')}\n*Time on Site:${val('t_total')}\n{panel}\n`;

    r += `{panel:title=Hub Stock Location:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\nLocation:${val('hub')}\n{panel}\n`;

    r += `{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n`;
    for(let cat in inventory) {
        let items = inventory[cat].filter(i => cart[i.id + i.n]);
        if(items.length > 0) {
            r += `h5. _${cat}_\n||_SAP_||_Materials_||_QTY_||\n`;
            items.forEach(i => {
                r += `|${i.id}|{{${i.n}}}|${cart[i.id + i.n].q.toString().padStart(2,'0')}|\n`;
            });
        }
    }
    r += `{panel}\n`;

    r += `{panel:title=Additional Notes:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n${val('notes')}\n{panel}\n`;

    r += `{panel:title=Splitter Activation:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\nFloor:${val('s_floor')}\nPanel:${val('s_panel')}\nSplitter:${val('s_split')}\nBulkheads Installed:${val('s_bulk')}*\n{panel}`;

    const el = document.createElement('textarea'); el.value = r; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    alert("Copied directly matching Spreadsheet format!");
}

function convertTime(time24) {
    let [h, m] = time24.split(':');
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
}

window.onload = render;
</script>
</body>
</html>
