<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toolbox - Material Test</title>
    <style>
        :root { --primary: #2d8a45; --bg: #f2f7f2; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .page { padding: 12px; padding-bottom: 100px; }
        
        .cat-title { font-size: 14px; font-weight: 800; margin: 20px 0 8px 5px; color: #113311; text-transform: uppercase; border-bottom: 2px solid #d0ddd0; padding-bottom: 4px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e0e6e0; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .mat-name { font-size: 15px; font-weight: bold; color: #222; margin-bottom: 4px; }
        .mat-sap { font-size: 12px; color: #888; font-family: monospace; }
        
        .qty-ctrl { display: flex; align-items: center; gap: 15px; background: #f8f9fa; padding: 4px 6px; border-radius: 20px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ccc; background: white; font-weight: bold; font-size: 18px; color: var(--primary); }
        .qty-val { font-weight: 900; font-size: 16px; min-width: 20px; text-align: center; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ccc; padding: 15px; box-sizing: border-box; }
        .btn-main { width: 100%; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; color: white; background: var(--primary); }
    </style>
</head>
<body>

<div class="page active">
    <div id="mat-container"></div>
</div>

<div class="footer">
    <button class="btn-main" onclick="testCopy()">COPY MATERIAL JIRA FORMAT</button>
</div>

<script>
// 注意这里的 outCat，它是用来在后台瞒天过海，转换成 Google Sheet 分类的！
const inventory = {
    "Frequently Used": [
        // --- Nokia 组 ---
        {id:"1002557", n:"Nokia XS-010X-R", outCat: "Hardware"},
        {id:"1002589", n:"Nokia ONT Mount - Custom", outCat: "Other"},
        {id:"1002573", n:"Nokia ONT Mount - Factory", outCat: "Other"},
        {id:"1002555", n:"Nokia Beacon 19", outCat: "Hardware"},
        
        // --- Zhone 组 ---
        {id:"1001199", n:"4 port GPON zhone", outCat: "Hardware"},
        {id:"1002327", n:"NEW ZHONE 2424GN", outCat: "Hardware"},
        {id:"1002324", n:"5222XG Zhone", outCat: "Hardware"},
        {id:"1002245", n:"GN/XGS Zhone mounts", outCat: "Other"},
        {id:"1000420", n:"Zhone mounts", outCat: "Other"},
        
        // --- 线缆与接头组 ---
        {id:"1002335", n:"1m LC APC/APC Patches", outCat: "Fibre"},
        {id:"1002388", n:"SC APC SC APC Patches", outCat: "Fibre"},
        {id:"1001083", n:"LC APC Connector", outCat: "Fibre"},
        {id:"1002322", n:"Fibre Jack", outCat: "Fibre"},
        {id:"1000289", n:"RJ45 Connector", outCat: "Copper"},
        {id:"1000520", n:"White Jacks", outCat: "Copper"},
        
        // --- 其他常用杂项 ---
        {id:"1002344", n:"Airties 4960x", outCat: "Hardware"},
        {id:"1000526", n:"Heat Sleeve 40mm", outCat: "Fibre"},
        {id:"1000715", n:"Screws (8, 3/4)", outCat: "Other"},
        {id:"1000477", n:"Alchohol wipes", outCat: "Other"},
        {id:"1001047", n:"2 Port Faceplate", outCat: "Copper"},
        {id:"-", n:"Beanfield Stickers", outCat: "Other"},
        {id:"-", n:"Booties", outCat: "Other"}
    ],
    "Hardware": [
        {id:"1001087", n:"Active-e zhone", outCat: "Hardware"},
        {id:"1002556", n:"Nokia XS-220x VOIP", outCat: "Hardware"},
        {id:"1001554", n:"SML TV Box", outCat: "Hardware"},
        {id:"1002407", n:"Archer C20 (100MBS)", outCat: "Hardware"},
        {id:"1002481", n:"TP LINK ARCHER AX23", outCat: "Hardware"}
    ],
    "Fibre": [
        {id:"1001084", n:"SC APC connectors", outCat: "Fibre"},
        {id:"1000422", n:"LC UPC 250/900", outCat: "Fibre"},
        {id:"1000476", n:"SC UPC", outCat: "Fibre"}
    ],
    "Copper": [
        {id:"1001048", n:"4 port faceplates", outCat: "Copper"},
        {id:"1001049", n:"Coax Insert", outCat: "Copper"},
        {id:"1000254", n:"3ft cat5 patch cable", outCat: "Copper"},
        {id:"1000497", n:"5ft cat5 patch cable", outCat: "Copper"},
        {id:"1000253", n:"10ft cat5 patch cable", outCat: "Copper"}
    ],
    "OTHER": [
        {id:"1001208", n:"Power Extension", outCat: "Other"},
        {id:"1000627", n:"Dry wall anchors", outCat: "Other"},
        {id:"1000137", n:"Saddles (small)", outCat: "Other"},
        {id:"1000136", n:"Saddles (large)", outCat: "Other"},
        {id:"1000501", n:"Phone Dongles", outCat: "Other"}
    ]
};

let cart = {};

function render() {
    const cont = document.getElementById('mat-container');
    cont.innerHTML = "";
    for(let cat in inventory) {
        let h = `<div class="cat-title">${cat}</div>`;
        inventory[cat].forEach(item => {
            const k = item.id + item.n;
            const q = cart[k]?.q || 0;
            h += `<div class="item-row">
                <div>
                    <div class="mat-name">${item.n}</div>
                    <div class="mat-sap">SAP: ${item.id}</div>
                </div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.n}','${item.outCat}',-1)">-</button>
                    <span class="qty-val">${q}</span>
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.n}','${item.outCat}',1)">+</button>
                </div>
            </div>`;
        });
        cont.innerHTML += h;
    }
}

function updateQty(id, n, outCat, d) {
    const k = id + n;
    // 这里把 outCat 存进购物车，为最后的分类做准备
    if(!cart[k]) cart[k] = {id, n, outCat, q:0};
    cart[k].q += d;
    if(cart[k].q <= 0) delete cart[k];
    render();
}

function testCopy() {
    // 1. 准备 4 个空桶，严格匹配 Google Sheet 的分类
    let sortedMats = { "Copper": [], "Fibre": [], "Hardware": [], "Other": [] };
    let hasItems = false;
    
    // 2. 把购物车里的东西，按照暗标签（outCat）扔进对应的桶里
    for(let k in cart) {
        let cat = cart[k].outCat;
        if(sortedMats[cat]) {
            sortedMats[cat].push(cart[k]);
            hasItems = true;
        }
    }

    // 3. 生成严格对齐 Jira 的文本
    let r = `{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n`;
    if(hasItems) {
        for(let cat of ["Copper", "Fibre", "Hardware", "Other"]) {
            if(sortedMats[cat].length > 0) {
                // 注意这里 Google Sheet 的拼写: Fibre, Copper 等
                r += `h5._${cat}_\n||_SAP_||_Materials_||_QTY_||\n`;
                sortedMats[cat].forEach(i => {
                    r += `|${i.id}|{{${i.n}}}|${i.q.toString().padStart(2,'0')}|\n`;
                });
            }
        }
    } else {
        r += "No materials selected.\n";
    }
    r += `{panel}\n`;

    const el = document.createElement('textarea'); el.value = r; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    alert("测试：物料已复制！快去 Jira 粘贴看看分类对不对。");
}

window.onload = render;
</script>
</body>
</html>
