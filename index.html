<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beanfield Toolbox v22.0</title>
    <style>
        :root { --primary: #2d8a45; --bg: #f2f7f2; --card: #ffffff; --header: #93cc94; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        .nav-tabs { position: sticky; top: 0; display: flex; background: #fff; padding: 10px; gap: 8px; z-index: 2000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; background: #e8eee8; color: #777; }
        .tab-btn.active { background: var(--primary); color: white; }
        .page { display: none; padding: 12px; padding-bottom: 250px; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #d0ddd0; }
        h3 { margin: 0; font-size: 13px; color: #1a4a2a; background: var(--header); padding: 12px 15px; border-bottom: 1px solid #d0ddd0; font-weight: 700; text-transform: uppercase; }
        .card-body { padding: 15px; }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ced4ce; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .toggle-group { display: flex; gap: 5px; }
        .toggle-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ced4ce; background: #fff; font-size: 13px; font-weight: 600; color: #666; text-align: center; }
        .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .qty-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ccc; background: #fff; font-size: 20px; color: var(--primary); }
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #ccc; padding: 15px; box-sizing: border-box; z-index: 1000; }
        .copy-main { width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 17px; color: white; background: var(--primary); }
        .tag { display: inline-flex; align-items: center; background: #e8f5e9; color: var(--primary); padding: 6px 12px; border-radius: 6px; margin: 4px; font-size: 14px; border: 1px solid var(--primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('picker', this)">Materials</button>
    <button class="tab-btn" onclick="showPage('beanfield', this)">Beanfield Report</button>
</div>

<div id="picker" class="page active">
    <input type="text" id="matSearch" placeholder="🔍 Search SAP or Name..." onkeyup="filterMats()" style="margin-bottom:15px;">
    <div id="mat-container"></div>
</div>

<div id="beanfield" class="page">
    <div class="card">
        <h3>Technician Info</h3>
        <div class="card-body grid">
            <div><label>Inside Tech</label><input type="text" id="bf_in"></div>
            <div><label>Outside Tech</label><input type="text" id="bf_out"></div>
        </div>
    </div>

    <div class="card">
        <h3>Testing</h3>
        <div class="card-body">
            <div class="field">
                <label>Tests Completed</label>
                <div class="toggle-group" id="bf_tests_done">
                    <div class="toggle-btn active" onclick="setToggle('bf_tests_done', 'Yes')">Yes</div>
                    <div class="toggle-btn" onclick="setToggle('bf_tests_done', 'No')">No</div>
                </div>
            </div>
            <div class="grid" style="margin-bottom:10px;">
                <div><label>Ruby (riser)</label><input type="text" id="bf_ruby" placeholder="e.g. -20.5"></div>
                <div><label>Exfo</label><input type="text" id="bf_exfo" value="Yes"></div>
            </div>
            <div class="grid">
                <div><label>Light Meter</label><input type="text" id="bf_light" value="Yes"></div>
                <div><label>WiFi</label><input type="text" id="bf_wifi" value="Yes"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Equipment Details</h3>
        <div class="card-body">
            <label>Primary Device Type</label>
            <div class="toggle-group" id="tg_pri_type" style="margin-bottom:12px;">
                <div class="toggle-btn active" onclick="setPrimaryType('Zhone')">Zhone</div>
                <div class="toggle-btn" onclick="setPrimaryType('ONT')">ONT</div>
            </div>
            <div class="field"><label id="lbl_z_loc">Zhone Location</label><input type="text" id="bf_z_loc"></div>
            <div class="field"><label id="lbl_z_mac">Zhone MAC</label><input type="text" id="bf_z_mac"></div>
            <div class="field"><label id="lbl_z_mod">Zhone Model</label><input type="text" id="bf_z_mod"></div>
            
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            
            <label>Secondary Device Type</label>
            <div class="toggle-group" id="tg_router_type" style="margin-bottom:12px;">
                <div class="toggle-btn active" onclick="setRouterType('Airties')">Airties</div>
                <div class="toggle-btn" onclick="setRouterType('Beacon')">Beacon</div>
            </div>
            <div class="field"><label id="lbl_router_loc">Airties Location</label><input type="text" id="bf_r_loc"></div>
            <div class="field"><label id="lbl_router_mac">Airties-MAC</label><input type="text" id="bf_r_mac"></div>
            <div class="field"><label id="lbl_router_mod">Airties Model</label><input type="text" id="bf_r_mod" value="4960x"></div>
        </div>
    </div>

    <div class="card">
        <h3>Cabling & Marks</h3>
        <div class="card-body">
            <div class="field"><label>?/? lines terminated & fluked</label><input type="text" id="bf_lines" placeholder="2/6"></div>
            <label>Room Locations</label>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
                <input type="text" id="bf_loc_input" placeholder="e.g. Bed 1" style="flex:1">
                <button onclick="addTag()" style="background:var(--primary); color:white; border:none; border-radius:10px; padding:0 15px; font-size:20px;">+</button>
            </div>
            <div id="bf_tags" style="margin-bottom:15px;"></div>
            
            <div class="field">
                <label id="lbl_closet_advisory">Airties in closet advisory?</label>
                <div class="toggle-group" id="bf_closet">
                    <div class="toggle-btn" onclick="setToggle('bf_closet', 'Yes')">Yes</div>
                    <div class="toggle-btn" onclick="setToggle('bf_closet', 'No')">No</div>
                    <div class="toggle-btn active" onclick="setToggle('bf_closet', 'N/A')">N/A</div>
                </div>
            </div>

            <div class="field">
                <label>$100 Charge Notified?</label>
                <div class="toggle-group" id="bf_charge">
                    <div class="toggle-btn" onclick="setToggle('bf_charge', 'Yes')">Yes</div>
                    <div class="toggle-btn active" onclick="setToggle('bf_charge', 'No')">No</div>
                </div>
            </div>
            
            <label>Reason (Closet/No Cat5)</label>
            <textarea id="bf_reason" rows="2"></textarea>
        </div>
    </div>

    <div class="card">
        <h3>Infrastructure</h3>
        <div class="card-body">
            <div class="field"><label>Floor/Panel/Port</label><input type="text" id="bf_fpp"></div>
            <label>Fiber Marks (m)</label>
            <div class="grid">
                <input type="number" id="bf_m_riser" placeholder="Riser" oninput="calcTotal()">
                <input type="number" id="bf_m_suite" placeholder="Suite" oninput="calcTotal()">
            </div>
            <input type="text" id="bf_m_total" readonly style="margin-top:8px; background:#e8f5e9; font-weight:bold;" placeholder="Total">
            <div class="field" style="margin-top:10px;"><label>Hub Stock Location</label><input type="text" id="bf_hub" value="2206 Eglinton Ave east"></div>
        </div>
    </div>

    <div class="card"><h3>Notes</h3><div class="card-body"><textarea id="bf_notes" rows="2"></textarea></div></div>
</div>

<div class="footer"><button id="copyBtn" class="copy-main" onclick="doCopy()">Copy Jira Report</button></div>

<script>
// 全量还原 v17.0 的 inventory
const inventory = {
    "Frequently Used": [
        {id:"1001199", n:"4 port GPON zhone"}, {id:"1002327", n:"NEW ZHONE 2424GN"}, {id:"1002324", n:"XGS Zhone"},
        {id:"1002557", n:"Nokia XS-010x ONT"}, {id:"1002573", n:"Nokia ONT Mount"},
        {id:"1002245", n:"GN/XGS Zhone mounts"}, {id:"1000420", n:"Zhone mounts"}, 
        {id:"1002344", n:"Airties 4960x"}, {id:"1002555", n:"Nokia Beacon"}, {id:"1001083", n:"LC APC connectors"}, 
        {id:"1000526", n:"Heat sleeves"}, {id:"1002322", n:"Fibre jacks"}, {id:"1002388", n:"APC APC Patches SC-SC"}, 
        {id:"1000715", n:"Screws (8, 3/4)"}, {id:"1000477", n:"Alchohol wipes"}, {id:"1000289", n:"RJ45 connectors"}, 
        {id:"1001047", n:"2 port face plates"}, {id:"1000520", n:"White jacks"}, {id:"-", n:"Beanfield Stickers"}, {id:"-", n:"Booties"}
    ],
    "Hardware": [
        {id:"1001087", n:"Active-e zhone"}, {id:"1002556", n:"Nokia XS-220x VOIP ONT"}
    ],
    "Fiber": [
        {id:"1001084", n:"SC APC connectors"}, {id:"1000422", n:"LC UPC 250/900"}, {id:"1000476", n:"SC UPC"}
    ],
    "Copper": [
        {id:"1001048", n:"4 port faceplates"}, {id:"1001049", n:"Coax connectors"}, {id:"1000254", n:"3ft cat5 patch cable"},
        {id:"1000497", n:"5ft cat5 patch cable"}, {id:"1000253", n:"10ft cat5 patch cable"}
    ],
    "OTHER": [
        {id:"1001208", n:"Power Extension"}, {id:"1000627", n:"Dry wall anchors"}, {id:"1000137", n:"Saddles (small)"},
        {id:"1000136", n:"Saddles (large)"}, {id:"1001554", n:"SML TV Box"}, {id:"1000501", n:"Phone Dongles"},
        {id:"1002407", n:"Archer C20 (100MBS)"}, {id:"1002481", n:"TP LINK ARCHER AX23 (750MBS)"}
    ]
};

let cart = {};
let toggles = { 'bf_tests_done': 'Yes', 'bf_closet': 'N/A', 'bf_charge': 'No', 'pri_type':'Zhone', 'router_type':'Airties' };
let tags = [];

function setToggle(gid, v) {
    toggles[gid] = v;
    document.getElementById(gid).querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.innerText === v));
}

function setPrimaryType(type) {
    toggles['pri_type'] = type;
    document.getElementById('tg_pri_type').querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.innerText === type));
    ['lbl_z_loc','lbl_z_mac','lbl_z_mod'].forEach(id => document.getElementById(id).innerText = type + (id.includes('loc')?' Location':id.includes('mac')?' MAC':' Model'));
    document.getElementById('bf_z_mod').value = (type === 'ONT') ? "XS-010x" : "";
}

function setRouterType(type) {
    toggles['router_type'] = type;
    document.getElementById('tg_router_type').querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.innerText === type));
    document.getElementById('lbl_router_loc').innerText = type + " Location";
    document.getElementById('lbl_router_mac').innerText = type + "-MAC";
    document.getElementById('lbl_router_mod').innerText = type + " Model";
    document.getElementById('lbl_closet_advisory').innerText = type + " in closet advisory?";
    document.getElementById('bf_r_mod').value = (type === 'Beacon') ? "Beacon19" : "4960x";
}

function calcTotal() {
    const r = parseFloat(document.getElementById('bf_m_riser').value) || 0;
    const s = parseFloat(document.getElementById('bf_m_suite').value) || 0;
    document.getElementById('bf_m_total').value = Math.abs(s - r).toFixed(1) + "m";
}

function render() {
    const cont = document.getElementById('mat-container');
    cont.innerHTML = "";
    for(let cat in inventory) {
        let h = `<div class="card"><h3>${cat}</h3><div class="card-body">`;
        inventory[cat].forEach(item => {
            const k = item.id + item.n;
            h += `<div class="item-card">
                <div><div style="font-size:14px;font-weight:600;">${item.n}</div><div style="font-size:11px;color:#888;">SAP: ${item.id}</div></div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.n}',-1)">-</button>
                    <span style="min-width:15px; font-weight:bold;">${cart[k]?.q || 0}</span>
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.n}',1)">+</button>
                </div>
            </div>`;
        });
        cont.innerHTML += h + `</div></div>`;
    }
}

function updateQty(id, n, d) {
    const k = id + n;
    if(!cart[k]) cart[k] = {id, n, q:0};
    cart[k].q += d;
    if(cart[k].q <= 0) delete cart[k];
    
    // 智能填充逻辑
    if (toggles['pri_type'] === 'Zhone' && d > 0) {
        const zMod = document.getElementById('bf_z_mod');
        if (id === "1001199") zMod.value = "2424A1";
        else if (id === "1002327") zMod.value = "2424gn";
        else if (id === "1002324") zMod.value = "5222xg";
    }
    render();
}

function filterMats() {
    let v = document.getElementById('matSearch').value.toLowerCase();
    document.querySelectorAll('.item-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? "flex" : "none");
}

function addTag() {
    const v = document.getElementById('bf_loc_input').value.trim();
    if(v) { tags.push(v); document.getElementById('bf_loc_input').value=""; renderTags(); }
}
function renderTags() {
    document.getElementById('bf_tags').innerHTML = tags.map((t, i) => `<div class="tag">${t} <span onclick="tags.splice(${i},1);renderTags()">×</span></div>`).join('');
}

function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('copyBtn').innerText = (id === 'picker') ? "Copy Materials Only" : "Copy Jira Report";
}

function doCopy() {
    const getV = (id) => document.getElementById(id).value || "---";
    const panel = (title, content) => `{panel:title=${title}:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}${content}{panel}`;

    // 生成物料表格 (Jira 表格格式)
    let matMarkup = "";
    for(let cat in inventory) {
        let items = inventory[cat].filter(i => cart[i.id + i.n]);
        if(items.length > 0) {
            matMarkup += `h5. _${cat}_\n||_SAP_||_Materials_||_QTY_||\n`;
            items.forEach(i => {
                matMarkup += `|${i.id}|{{${i.n}}}|${cart[i.id + i.n].q.toString().padStart(2,'0')}|\n`;
            });
        }
    }

    if(document.getElementById('picker').classList.contains('active')) {
        copyToClipboard(matMarkup || "No items selected");
        return;
    }

    // 生成完整 Jira 报告
    const rubyColor = toggles['bf_tests_done'] === 'Yes' ? "{color:#ED1C24}Yes{color}" : "No";
    let pType = toggles['pri_type'], rType = toggles['router_type'];

    let out = panel("Technician(s):", `Inside Tech: ${getV('bf_in')} Outside Tech: ${getV('bf_out')}`);
    out += panel("Tests Completed:", `Tests: ${toggles['bf_tests_done']} | Ruby 🚨: ${rubyColor}\nLight @ 1577nm: ${getV('bf_ruby')} | Exfo: ${getV('bf_exfo')}\nLight Meter: ${getV('bf_light')} | WiFi: ${getV('bf_wifi')}`);
    out += panel("Installation Details:", `*${pType} Location*: ${getV('bf_z_loc')}\n*${pType} MAC*: ${getV('bf_z_mac')}\n*${pType} Model*: ${getV('bf_z_mod')}\n\n*${rType} Location*: ${getV('bf_r_loc')}\n*${rType} MAC*: ${getV('bf_r_mac')}\n*${rType} Model*: ${getV('bf_r_mod')}\n\n_Closet Advisory?_ ${toggles['bf_closet']}`);
    
    let locStr = tags.map(t => "        " + t + ": 1").join('\n');
    out += panel("Cat5 Termination:", `${getV('bf_lines')} lines terminated & fluked plugged into the ${pType}\n_Location(s):_\n${locStr || "None"}\n\n_Customer notified of $100 charge?_ ${toggles['bf_charge']}\n_Reason:_ ${getV('bf_reason')}`);
    
    out += panel("Infrastructure:", `Floor/Panel/Port: ${getV('bf_fpp')}\nFiber Marks: Riser=${getV('bf_m_riser')}m, Suite=${getV('bf_m_suite')}m, Total=${getV('bf_m_total')}\nHub Stock: ${getV('bf_hub')}`);
    out += panel("Material List:", matMarkup || "No items selected");
    out += panel("Additional Notes:", getV('bf_notes'));

    copyToClipboard(out);
}

function copyToClipboard(t) {
    const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    alert("Jira Markup Copied!");
}

window.onload = render;
</script>
</body>
</html>
